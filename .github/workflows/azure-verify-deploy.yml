name: Verify and Deploy

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

jobs:
  verify_and_deploy:
    name: Verify and Deploy
    runs-on: ubuntu-latest

    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      AZURE_STATIC_WEB_APPS_API_TOKEN_DEV: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
      AZURE_STATIC_WEB_APPS_API_TOKEN_PROD: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
      APP_LOCATION: "."
      API_LOCATION: "api"
      OUTPUT_LOCATION: "dist/bhagavad-gita/browser"

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3: Set Deployment Environment
      - name: Set Deployment Environment
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            if [ "${{ github.ref_name }}" == "main" ]; then
              echo "SWA_CLI_DEPLOY_ENV=production" >> $GITHUB_ENV
            else
              echo "SWA_CLI_DEPLOY_ENV=development" >> $GITHUB_ENV
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ github.base_ref }}" == "main" ]; then
              echo "SWA_CLI_DEPLOY_ENV=production" >> $GITHUB_ENV
            else
              echo "SWA_CLI_DEPLOY_ENV=development" >> $GITHUB_ENV
            fi
          fi
          if { [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "development" ]; } || \
             { [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; }; then
            echo "SHOULD_DEPLOY=true" >> $GITHUB_ENV
          else
            echo "SHOULD_DEPLOY=false" >> $GITHUB_ENV
          fi

      # Step 4: Install dependencies
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # Step 5: Install Angular CLI
      - name: Install Angular CLI
        run: npm install -g @angular/cli@19

      # Step 6: Install Angular CLI
      - name: Run unit tests
        run: npm test

      # Step 7: Install API Dev Dependencies
      - name: Install API Dev Dependencies
        run: |
          cd api
          npm ci
          cd -

      # Step 8: Run API Unit Tests
      - name: Run API Unit Tests
        run: |
          cd api
          npm test
          cd -

      # Step 8.5: Generate env variables
      - name: Generate Angular Environment File
        run: |
          export APP_VERSION=$(node -p "require('./package.json').version")
          export APP_RELEASE_DATE="$(date +"%Y-%m-%d %H:%M:%S")"
          # Fetch the head_ref branch and get its last commit hash
          if [ "${{ github.head_ref }}" != "" ]; then
            git fetch origin ${{ github.head_ref }}:${{ github.head_ref }}
            export APP_COMMIT_HASH=$(git rev-parse --short ${{ github.head_ref }})
          else
            export APP_COMMIT_HASH=$(git rev-parse --short HEAD)
          fi
          node generate-env.js

      # Step 9: Build the application
      - name: Build Application
        run: |
          echo "Building application for environment: $SWA_CLI_DEPLOY_ENV"
          if [ "$SWA_CLI_DEPLOY_ENV" = "production" ]; then
            npx ng build --configuration=production
          else
            npx ng build --configuration=$SWA_CLI_DEPLOY_ENV
          fi

      # Step 10: Install API dependencies
      - name: Install API Dependencies
        run: |
          cd api
          npm ci --omit=dev
          cd -

      # Step 11: Print Event Info
      - name: Debug Event Info
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Base Ref: ${{ github.base_ref }}"
          echo "Ref Name: ${{ github.ref_name }}"
          echo "Deployment Environment: $SWA_CLI_DEPLOY_ENV"
          echo "Should Deploy: $SHOULD_DEPLOY"

      - name: Validate Azure Deployment Token
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          if [ "$SWA_CLI_DEPLOY_ENV" = "production" ]; then
            DEPLOYMENT_TOKEN="$AZURE_STATIC_WEB_APPS_API_TOKEN_PROD"
            TOKEN_NAME="AZURE_STATIC_WEB_APPS_API_TOKEN_PROD"
          else
            DEPLOYMENT_TOKEN="${AZURE_STATIC_WEB_APPS_API_TOKEN_DEV:-$AZURE_STATIC_WEB_APPS_API_TOKEN}"
            TOKEN_NAME="AZURE_STATIC_WEB_APPS_API_TOKEN_DEV"
          fi

          if [ -z "$DEPLOYMENT_TOKEN" ]; then
            echo "$TOKEN_NAME is not set. Add the environment-specific Azure Static Web Apps deployment token as a repository secret."
            exit 1
          fi

      - name: Copy Static Web App Config
        if: env.SHOULD_DEPLOY == 'true'
        run: cp staticwebapp.config.json "$OUTPUT_LOCATION/staticwebapp.config.json"

      # Step 12: Conditionally deploy to Azure Static Web Apps
      - name: Deploy to Azure Static Web Apps - Production
        if: env.SHOULD_DEPLOY == 'true' && env.SWA_CLI_DEPLOY_ENV == 'production'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          app_build_command: npm run build:prod

      - name: Deploy to Azure Static Web Apps - Development
        if: env.SHOULD_DEPLOY == 'true' && env.SWA_CLI_DEPLOY_ENV != 'production'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV != '' && env.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV || env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          app_build_command: npm run build:dev

      # Step 13: Set up Python
      - name: Set up Python
        if: env.SHOULD_DEPLOY == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 14: Set up Python venv and install Robot Framework
      - name: Set up venv and install Robot Framework
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          python -m venv "$RUNNER_TEMP/rf-venv"
          source "$RUNNER_TEMP/rf-venv/bin/activate"
          pip install --upgrade pip
          pip install -r robot-tests/requirements.txt

      # Step 15: Install Robot Framework Browser
      - name: Initialize Robot Framework Browser
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          source "$RUNNER_TEMP/rf-venv/bin/activate"
          rfbrowser init

      # Step 16: Set AZURE_STATIC_WEB_APPS_URL based on environment
      - name: Set AZURE_STATIC_WEB_APPS_URL
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          if [ "$SWA_CLI_DEPLOY_ENV" = "production" ]; then
            echo "AZURE_STATIC_WEB_APPS_URL=${{ secrets.AZURE_STATIC_WEB_APPS_URL_PROD }}" >> $GITHUB_ENV
          else
            echo "AZURE_STATIC_WEB_APPS_URL=${{ secrets.AZURE_STATIC_WEB_APPS_URL_DEV }}" >> $GITHUB_ENV
          fi

      # Step 16.5: Wait for AZURE_STATIC_WEB_APPS_URL to be up
      - name: Wait for Static Web App to be Up
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "Waiting for $AZURE_STATIC_WEB_APPS_URL to be available..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$AZURE_STATIC_WEB_APPS_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Static Web App is up!"
              exit 0
            fi
            echo "Attempt $i: Not up yet (status: $STATUS). Waiting 10 seconds..."
            sleep 10
          done
          echo "Static Web App did not become available in time."
          exit 1

      # Step 17: Run Robot UI Tests
      - name: Run Robot UI Tests
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          source "$RUNNER_TEMP/rf-venv/bin/activate"
          mkdir -p "$RUNNER_TEMP/robot-results/ui"
          robot \
            --outputdir "$RUNNER_TEMP/robot-results/ui" \
            --variable HEADLESS:true \
            --variable APP_URL:$AZURE_STATIC_WEB_APPS_URL \
            robot-tests/ui_tests.robot

      # Step 18: Run Robot API Tests
      - name: Run Robot API Tests
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          source "$RUNNER_TEMP/rf-venv/bin/activate"
          mkdir -p "$RUNNER_TEMP/robot-results/api"
          robot \
            --outputdir "$RUNNER_TEMP/robot-results/api" \
            --variable API_URL:$AZURE_STATIC_WEB_APPS_URL/api \
            robot-tests/api_tests.robot
